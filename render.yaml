services:
  - type: web
    name: dance-academy-chatbot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_TIMEOUT_MS
        value: 20000
      - key: REQUEST_BODY_LIMIT
        value: 100kb
      - key: CORS_ALLOWED_ORIGINS
        value: https://blendance-business.lovable.app,https://id-preview--35786f41-2a06-40f9-911d-f60ee4f706fd.lovable.app,https://business.blendance.app
      - key: OPENAI_API_KEY
        sync: false
